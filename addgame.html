<head>

  <title>Tambah Game — TourneyPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>

  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">

            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>

        <div>
          <div class="sidebar-logo-text">TourneyPro</div>
          <div class="sidebar-logo-sub">MLBB Manager</div>
        </div>
      </div>

      <div class="sidebar-nav">
        <div class="nav-section-label">Navigation</div>

        <a href="index.html" class="nav-item" data-page="index.html">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Dashboard

        <a href="tournament.html" class="nav-item" data-page="tournament.html">
          <svg viewBox="0 0 24 24">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
          </svg>
          Tournament
        </a>

        <a href="match.html" class="nav-item active" data-page="match.html">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Match
        </a>

        <a href="train.html" class="nav-item" data-page="train.html">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Train
        </a>

        <a href="team.html" class="nav-item" data-page="team.html">
          <svg viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Tim
        </a>
      </div>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-breadcrumb">
          <button class="menu-toggle" id="menuToggle">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span>Game</span><span class="sep">/</span><span class="current">Input Game</span>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">Tambah Game</h1>
            <p class="page-subtitle">Catat game baru tim</p>
          </div>
          <a href="game.html" class="btn btn-secondary">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Kembali
          </a>
        </div>
        <section class="card" id="tahap1">
          <div class="card-header">
            <h2 class="card-title">Tahap 1: Informasi Game</h2>
          </div>
          <div style="display: grid; gap: 16px; margin-top: 16px;">
            <div class="grid-2">
              <div>
                <label class="form-label">Game Number</label>
                <select class="input" id="gameNumber">
                  <option value="1">Game 1</option><option value="2">Game 2</option>
                  <option value="3">Game 3</option><option value="4">Game 4</option>
                  <option value="5">Game 5</option>
                </select>
              </div>
              <div>
                <label class="form-label">Hasil Pertandingan</label>
                <select class="input" id="gameResult">
                  <option value="win">WIN</option>
                  <option value="lose">LOSE</option>
                </select>
              </div>
            </div>

            <div class="grid-2">
              <div>
                <label class="form-label">Total Kills Tim</label>
                <input class="input" type="number" id="teamKills" placeholder="0" min="0" required />
              </div>
              <div>
                <label class="form-label">Total Deaths Tim</label>
                <input class="input" type="number" id="teamDeaths" placeholder="0" min="0" required />
              </div>
            </div>

            <div>
              <label class="form-label">Durasi Game</label>
              <div style="display: flex; gap: 12px; align-items: center;">
                <input class="input" type="number" id="gameDurationMin" placeholder="Menit" min="0" required style="width: 120px;" />
                <span class="text-muted">menit</span>
                <input class="input" type="number" id="gameDurationSec" placeholder="Detik" min="0" max="59" required style="width: 120px;" />
                <span class="text-muted">detik</span>
              </div>
            </div>

            <div class="actions" style="margin-top: 16px;">
              <button class="btn btn-primary" id="btnNextStep" type="button">
                Next
              </button>
            </div>
          </div>
        </section>

        <section class="card hidden" id="tahap2" style="margin-top: 24px;">
          <div class="card-header">
            <h2 class="card-title">Tahap 2: Statistik Pemain</h2>
          </div>
          
          <div class="grid-3" id="playerContainer" style="margin-top: 16px;">
            <article class="role-card">
              <div class="role-head">
                <div class="role-name">Jungler</div><span class="tag">Role 1</span>
              </div>
              <select class="input select-player" required></select>
              <select class="input select-hero" style="margin-top: 8px;" required></select>
              <div class="grid-3" style="margin-top: 12px;">
                <input class="input input-kills" type="number" placeholder="Kill" required />
                <input class="input input-deaths" type="number" placeholder="Death" required />
                <input class="input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="input input-gold" type="number" placeholder="Total Gold" style="margin-top: 12px;" required />
            </article>

            <article class="role-card">
              <div class="role-head">
                <div class="role-name">Roamer</div><span class="tag">Role 2</span>
              </div>
              <select class="input select-player" required></select>
              <select class="input select-hero" style="margin-top: 8px;" required></select>
              <div class="grid-3" style="margin-top: 12px;">
                <input class="input input-kills" type="number" placeholder="Kill" required />
                <input class="input input-deaths" type="number" placeholder="Death" required />
                <input class="input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="input input-gold" type="number" placeholder="Total Gold" style="margin-top: 12px;" required />
            </article>

            <article class="role-card">
              <div class="role-head">
                <div class="role-name">Mid Laner</div><span class="tag">Role 3</span>
              </div>
              <select class="input select-player" required></select>
              <select class="input select-hero" style="margin-top: 8px;" required></select>
              <div class="grid-3" style="margin-top: 12px;">
                <input class="input input-kills" type="number" placeholder="Kill" required />
                <input class="input input-deaths" type="number" placeholder="Death" required />
                <input class="input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="input input-gold" type="number" placeholder="Total Gold" style="margin-top: 12px;" required />
            </article>

            <article class="role-card">
              <div class="role-head">
                <div class="role-name">Exp Laner</div><span class="tag">Role 4</span>
              </div>
              <select class="input select-player" required></select>
              <select class="input select-hero" style="margin-top: 8px;" required></select>
              <div class="grid-3" style="margin-top: 12px;">
                <input class="input input-kills" type="number" placeholder="Kill" required />
                <input class="input input-deaths" type="number" placeholder="Death" required />
                <input class="input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="input input-gold" type="number" placeholder="Total Gold" style="margin-top: 12px;" required />
            </article>

            <article class="role-card">
              <div class="role-head">
                <div class="role-name">Gold Laner</div><span class="tag">Role 5</span>
              </div>
              <select class="input select-player" required></select>
              <select class="input select-hero" style="margin-top: 8px;" required></select>
              <div class="grid-3" style="margin-top: 12px;">
                <input class="input input-kills" type="number" placeholder="Kill" required />
                <input class="input input-deaths" type="number" placeholder="Death" required />
                <input class="input input-assists" type="number" placeholder="Assist" required />
              </div>
              <input class="input input-gold" type="number" placeholder="Total Gold" style="margin-top: 12px;" required />
            </article>
          </div>

          <div class="actions" style="margin-top: 24px; display: flex; gap: 12px;">
            <button class="btn btn-secondary" id="btnBackStep" type="button">
              Kembali ke Tahap 1
            </button>
            <button class="btn btn-primary" id="btnSubmitAll" type="button">
              <svg viewBox="0 0 24 24" style="width:18px; margin-right:8px; stroke:currentColor; fill:none;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Simpan Game
            </button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>           
    var d=document.documentElement;
    var pref=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
    d.setAttribute('data-theme',pref);
    function updateIcon(theme){
      var btn=document.getElementById('themeToggle');
      if(!btn)return;
      btn.innerHTML=theme==='dark'
        ?'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        :'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
    window.toggleTheme=function(){
      var curr=d.getAttribute('data-theme')||'light';
      var next=curr==='dark'?'light':'dark';
      d.setAttribute('data-theme',next);
      updateIcon(next);
    };
    window.addEventListener('DOMContentLoaded',function(){updateIcon(d.getAttribute('data-theme'));});   
    
    // Fungsi Global Toast Notification
    function showToast(msg, type){
      type = type || 'success';
      var c = document.getElementById('toastContainer');
      if(!c) return;
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.innerHTML = '<span class="toast-icon"><svg viewBox="0 0 24 24">'
        + (type === 'success' ? '<polyline points="20 6 9 17 4 12"/>' : '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>')
        + '</svg></span><span class="toast-msg">' + msg + '</span>';
      c.appendChild(t);
      setTimeout(function() { t.classList.add('show'); }, 10);
      setTimeout(function() {
        t.classList.remove('show');
        setTimeout(function() { t.remove(); }, 300);
      }, 3000);
    }
    
    window.addEventListener('DOMContentLoaded',function(){
      var toggle=document.getElementById('menuToggle');
      var sidebar=document.getElementById('sidebar');
      var overlay=document.getElementById('sidebarOverlay');
      if(toggle){
        toggle.addEventListener('click',function(){
          sidebar.classList.toggle('open');
          overlay.classList.toggle('show');
        });
      }
      if(overlay){
        overlay.addEventListener('click',function(){
          sidebar.classList.remove('open');
          overlay.classList.remove('show');
        });
      }
      // Mark active nav item
      var path=window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav-item[data-page]').forEach(function(el){
        if(el.dataset.page===path)el.classList.add('active');
      });
    });
  </script>

  <script src="js/config.js"></script>
  <script src="js/addgame.js"></script>
</body>
</html>
