<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training — E-Sport Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Stats Bar ───────────────────────────────────────── */
    .stats-bar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md, 8px);
      margin-bottom: 12px;
    }
    .stats-bar-items { display: flex; gap: 24px; flex-wrap: wrap; }
    .stats-item { display: flex; flex-direction: column; align-items: center; min-width: 56px; }
    .stats-num  { font-size: 1.35rem; font-weight: 700; line-height: 1.1; }
    .stats-label { font-size: 0.72rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; color: var(--color-text-muted); margin-top: 2px; }
    .stats-win     .stats-num { color: var(--color-success, #22c55e); }
    .stats-draw    .stats-num { color: var(--color-gold,    #f59e0b); }
    .stats-lose    .stats-num { color: var(--color-error,   #ef4444); }
    .stats-winrate .stats-num { color: var(--color-primary, #3b82f6); }
    .stats-progress { display: flex; height: 6px; border-radius: 999px; overflow: hidden; background: var(--color-surface-offset); }
    .stats-progress-win  { background: var(--color-success, #22c55e); transition: width .4s; }
    .stats-progress-draw { background: var(--color-gold,    #f59e0b); transition: width .4s; }
    .stats-progress-lose { background: var(--color-error,   #ef4444); transition: width .4s; }

    /* ── Sort icon ────────────────────────────────────── */
    .sort-icon-wrap { display: inline-flex; margin-left: 4px; vertical-align: middle; opacity: .45; }
    th[data-sort-key]:hover .sort-icon-wrap { opacity: .8; }
    .sort-icon.sort-active { stroke: var(--color-primary, #3b82f6); opacity: 1 !important; }
    th[data-sort-key]:hover { background: var(--color-surface-offset, rgba(0,0,0,.04)); }

    /* ── Date filter ───────────────────────────────────── */
    .date-range-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .date-range-sep {
      color: var(--color-text-muted);
      font-size: 0.8rem;
      padding: 0 2px;
    }
    .table-date-input {
      width: 130px;
      padding: 0 8px;
      height: 32px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm, 6px);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 0.8rem;
      cursor: pointer;
    }
    .table-date-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px oklch(from var(--color-primary, #3b82f6) l c h / .15);
    }

    /* ── Action button group ──────────────────────────── */
    .btn-action-group { display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; }
    .btn.btn-outline {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text);
    }
    .btn.btn-outline:hover {
      background: var(--color-surface-offset);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    .btn.btn-outline-primary {
      background: transparent;
      border: 1px solid var(--color-primary);
      color: var(--color-primary);
    }
    .btn.btn-outline-primary:hover {
      background: var(--color-primary-highlight, rgba(59,130,246,.1));
    }
  </style>
</head>
<body>
  <div id="app-root">

    <main class="page-content" id="pageContent">
      <div class="container">

        <div class="page-header">
          <div>
            <h1 class="page-title">Training</h1>
            <p class="page-subtitle">Pantau perkembangan latihan tim — Scrim &amp; Ranked</p>
          </div>
          <a href="addmatch.html" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Tambah Match
          </a>
        </div>

        <!-- SCRIM -->
        <section class="section-card" aria-labelledby="scrimHeading">
          <div class="section-card-header">
            <h2 id="scrimHeading" class="section-title">
              Scrim
              <span id="scrimCount" class="badge badge-neutral">0 match</span>
            </h2>
          </div>
          <!-- stats-bar, toolbar diinjeksi JS -->
          <div class="table-wrap" id="scrimTableWrap">
            <table class="data-table" aria-label="Tabel Scrim">
              <thead id="scrimThead">
                <tr>
                  <th>#</th>
                  <th data-sort-key="date">Tanggal <span class="sort-icon-wrap"></span></th>
                  <th data-sort-key="opponent">Lawan <span class="sort-icon-wrap"></span></th>
                  <th data-sort-key="score">Skor / Hasil <span class="sort-icon-wrap"></span></th>
                  <th data-sort-key="format">Format <span class="sort-icon-wrap"></span></th>
                  <th data-sort-key="status">Status <span class="sort-icon-wrap"></span></th>
                  <th>Games</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="scrimBody">
                <tr><td colspan="8" class="table-loading">Memuat data&hellip;</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- RANKED -->
        <section class="section-card" aria-labelledby="rankedHeading">
          <div class="section-card-header">
            <h2 id="rankedHeading" class="section-title">
              Ranked
              <span id="rankedCount" class="badge badge-neutral">0 match</span>
            </h2>
          </div>
          <!-- stats-bar, toolbar diinjeksi JS -->
          <div class="table-wrap" id="rankedTableWrap">
            <table class="data-table" aria-label="Tabel Ranked">
              <thead id="rankedThead">
                <tr>
                  <th>#</th>
                  <th data-sort-key="date">Tanggal <span class="sort-icon-wrap"></span></th>
                  <th data-sort-key="opponent">Lawan / Sesi <span class="sort-icon-wrap"></span></th>
                  <th data-sort-key="score">Skor / Hasil <span class="sort-icon-wrap"></span></th>
                  <th data-sort-key="status">Status <span class="sort-icon-wrap"></span></th>
                  <th>Games</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="rankedBody">
                <tr><td colspan="7" class="table-loading">Memuat data&hellip;</td></tr>
              </tbody>
            </table>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="js/main.js"></script>
  <script src="js/train.js"></script>
</body>
</html>
